<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HRMS{% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-1: #f0fdfa;
            --bg-2: #faf5ff;
            --ink: #1e293b;
            --muted: #64748b;
            --brand: #0d9488;
            --brand-2: #0f766e;
            --accent: #f59e0b;
            --accent-violet: #7c3aed;
            --card: #ffffff;
            --card-border: rgba(13, 148, 136, 0.1);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            color: var(--ink);
            font-family: "Outfit", system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(13, 148, 136, 0.12), transparent),
                radial-gradient(ellipse 50% 40% at 100% 50%, rgba(139, 92, 246, 0.06), transparent),
                radial-gradient(ellipse 60% 40% at 0% 100%, rgba(245, 158, 11, 0.06), transparent),
                linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
            min-height: 100vh;
        }

        .glass {
            border: 1px solid var(--card-border);
            border-radius: 16px;
            background: var(--card);
            box-shadow: var(--shadow);
        }

        .site-nav {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
        }

        .nav-brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--ink);
            text-decoration: none;
        }

        .nav-brand:hover {
            color: var(--brand);
        }

        .nav-logo {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, #0d9488 0%, #7c3aed 100%);
            box-shadow: 0 4px 14px rgba(13, 148, 136, 0.3);
        }

        .btn-brand {
            background: linear-gradient(135deg, var(--brand), var(--brand-2));
            border: none;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(13, 148, 136, 0.3);
        }

        .btn-brand:hover {
            background: linear-gradient(135deg, #0f766e, #115e59);
            color: #fff;
            box-shadow: 0 6px 20px rgba(13, 148, 136, 0.4);
        }

        .btn-ghost {
            border: 1px solid var(--card-border);
            background: #fff;
            color: var(--ink);
            font-weight: 500;
        }

        .btn-ghost:hover {
            background: var(--bg-1);
            color: var(--brand);
            border-color: rgba(13, 148, 136, 0.25);
        }
        .nav-btn-reports { border-color: rgba(124, 58, 237, 0.2); color: #6d28d9; }
        .nav-btn-reports:hover { background: rgba(124, 58, 237, 0.08); color: #7c3aed; border-color: rgba(124, 58, 237, 0.25); }

        .table thead th {
            color: var(--muted);
            border-color: var(--card-border);
            background: var(--bg-1);
            font-weight: 700;
            font-size: 0.875rem;
        }

        .table tbody td {
            border-color: var(--card-border);
            background: #fff;
        }

        .btn-outline-danger {
            color: #b91c1c;
            border-color: rgba(185, 28, 28, 0.4);
        }
        .btn-outline-danger:hover {
            background: #fef2f2;
            color: #b91c1c;
            border-color: #b91c1c;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="site-nav">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between py-3">
                <a class="nav-brand" href="{% url 'home' %}">
                    <span class="nav-logo" aria-hidden="true"></span>
                    HRMS
                </a>
                <div class="d-flex gap-2">
                    <a href="{% url 'employees:employee-list' %}" class="btn btn-ghost btn-sm nav-btn-employees">
                        <i class="bi bi-people me-1"></i> Employees
                    </a>
                    <a href="{% url 'employees:employee-add-page' %}" class="btn btn-brand btn-sm">
                        <i class="bi bi-person-plus me-1"></i> Add Employee
                    </a>
                    <a href="{% url 'employees:department-chart' %}" class="btn btn-ghost btn-sm nav-btn-reports">
                        <i class="bi bi-bar-chart me-1"></i> Reports
                    </a>
                </div>
            </div>
        </div>
    </div>

    <main class="container my-4 my-md-5">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
